<!-- ============================================================
     READING PROGRESS BAR
     ============================================================ -->
<div id="reading-progress" aria-hidden="true">
  <div id="reading-progress__bar"></div>
</div>

<!-- ============================================================
     BACK TO TOP BUTTON
     ============================================================ -->
<button id="back-to-top" aria-label="맨 위로" title="맨 위로">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"></polyline>
  </svg>
</button>

<!-- ============================================================
     ADBLOCK DETECTION BANNER
     ============================================================ -->
<div id="adblock-notice" style="display:none;">
  <div class="adblock-notice__inner">
    <p class="adblock-notice__text">
      <span class="adblock-notice__icon">&#9749;</span>
      개떡같은 블로그에도 공수가 듭니다.. 콘텐츠가 도움이 되셨다면, 광고 차단 해제를 부탁드립니다. 감사합니다!
    </p>
    <button class="adblock-notice__close" onclick="this.parentElement.parentElement.style.display='none';localStorage.setItem('adblock-dismissed','1');" aria-label="닫기">&times;</button>
  </div>
</div>

<!-- ============================================================
     SCRIPTS
     ============================================================ -->
<script>
(function() {
  // --- Reading Progress Bar ---
  var progressBar = document.getElementById('reading-progress__bar');
  if (progressBar) {
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      progressBar.style.width = progress + '%';
    }, { passive: true });
  }

  // --- Back to Top Button ---
  var btn = document.getElementById('back-to-top');
  if (btn) {
    window.addEventListener('scroll', function() {
      if (window.scrollY > 400) {
        btn.classList.add('visible');
      } else {
        btn.classList.remove('visible');
      }
    }, { passive: true });

    btn.addEventListener('click', function() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // --- AdBlock Detection ---
  if (localStorage.getItem('adblock-dismissed') !== '1') {
    var testAd = document.createElement('div');
    testAd.innerHTML = '&nbsp;';
    testAd.className = 'adsbox ad-placement ad-banner textads banner-ads';
    testAd.style.cssText = 'position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;';
    document.body.appendChild(testAd);

    setTimeout(function() {
      var blocked = !testAd.offsetHeight || testAd.offsetParent === null || getComputedStyle(testAd).display === 'none';
      if (blocked) {
        var notice = document.getElementById('adblock-notice');
        if (notice) notice.style.display = 'block';
      }
      testAd.remove();
    }, 1500);
  }
})();
</script>

<!-- ============================================================
     INLINE STYLES (progress bar, back-to-top, adblock)
     ============================================================ -->
<style>

}

}

#back-to-top {

  z-index: 9998;

  height: 44px;
  border-radius: 50%;
  border: 1.5px solid #e4ddd0;
  background: #fff;

  display: flex;

  justify-content: center;

  transform: translateY(20px);
  pointer-events: none;
  transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

}

#back-to-top:hover {

  z-index: 9999;
  animation: adblockSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

.adblock-notice__inner {
  max-width: 720px;
  margin: 0 auto;
  padding: 1.2em 1.8em;
  background: #fff;
  border-top: 3px solid #1a6b5a;

  display: flex;
  align-items: center;
  gap: 1em;
}

.adblock-notice__text {
  margin: 0;
  font-size: 0.88em;

  color: #2c2c2c;
}

.adblock-notice__icon {
  font-size: 1.3em;

}

</style>
