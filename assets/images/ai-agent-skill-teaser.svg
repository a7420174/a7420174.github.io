<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#134d41"/>
      <stop offset="50%" style="stop-color:#1a6b5a"/>
      <stop offset="100%" style="stop-color:#2d9980"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#1a6b5a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="650" cy="80" r="120" fill="#c9a84c" opacity="0.08"/>
  <circle cx="150" cy="320" r="80" fill="#fff" opacity="0.05"/>
  <!-- Icon: gear + sparkle -->
  <g transform="translate(400,150)" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9">
    <circle cx="0" cy="0" r="28" stroke-dasharray="8 4"/>
    <circle cx="0" cy="0" r="12"/>
    <!-- Sparkle -->
    <line x1="42" y1="-20" x2="50" y2="-28" stroke="#c9a84c" stroke-width="2"/>
    <line x1="46" y1="-16" x2="54" y2="-16" stroke="#c9a84c" stroke-width="2"/>
    <line x1="42" y1="-12" x2="50" y2="-4" stroke="#c9a84c" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="400" y="230" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="38" font-weight="bold" letter-spacing="-0.5">AI Agent Skill</text>
  <text x="400" y="268" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="sans-serif" font-size="18" letter-spacing="3">scRNA-seq QC Automation</text>
  <!-- Bottom accent line -->
  <rect x="320" y="290" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- DNA bases -->
  <g font-family="monospace" font-size="14" font-weight="bold" opacity="0.15" fill="#fff">
    <text x="60" y="60">ATCG</text><text x="680" y="360">GCTA</text>
    <text x="700" y="50">AT</text><text x="40" y="370">CG</text>
  </g>
</svg>
