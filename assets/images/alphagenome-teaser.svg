<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="50%" style="stop-color:#283593"/>
      <stop offset="100%" style="stop-color:#1565c0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fc3f7"/>
      <stop offset="100%" style="stop-color:#81c784"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Decorative -->
  <circle cx="650" cy="90" r="100" fill="#4fc3f7" opacity="0.06"/>
  <circle cx="150" cy="310" r="80" fill="#81c784" opacity="0.05"/>
  <!-- DNA double helix stylized -->
  <g transform="translate(400,105)" stroke-width="2" fill="none" opacity="0.8">
    <path d="M-40,-15 Q-20,-30 0,-15 Q20,0 40,-15" stroke="#4fc3f7"/>
    <path d="M-40,0 Q-20,15 0,0 Q20,-15 40,0" stroke="#81c784"/>
    <!-- Variant marker -->
    <circle cx="0" cy="-8" r="6" fill="#ff7043" opacity="0.9"/>
    <text x="0" y="-6" text-anchor="middle" fill="#fff" font-family="monospace" font-size="8" font-weight="bold">V</text>
    <!-- Rungs -->
    <line x1="-25" y1="-22" x2="-25" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="0" y1="-15" x2="0" y2="0" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <line x1="25" y1="-22" x2="25" y2="8" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  </g>
  <!-- Text -->
  <text x="400" y="210" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="36" font-weight="bold" letter-spacing="-0.5">AlphaGenome</text>
  <text x="400" y="248" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="16" letter-spacing="2">Variant Effect Prediction API</text>
  <!-- Bottom accent -->
  <rect x="320" y="272" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Modality labels -->
  <g font-family="monospace" font-size="11" font-weight="500" opacity="0.3" fill="#fff" text-anchor="middle">
    <text x="200" y="330">Expression</text>
    <text x="330" y="330">Splicing</text>
    <text x="470" y="330">Chromatin</text>
    <text x="600" y="330">3D Contact</text>
  </g>
</svg>
