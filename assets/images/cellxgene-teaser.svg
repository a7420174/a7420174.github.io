<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b5e20"/>
      <stop offset="50%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#388e3c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#81c784"/>
      <stop offset="100%" style="stop-color:#4fc3f7"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <circle cx="650" cy="90" r="100" fill="#81c784" opacity="0.08"/>
  <circle cx="150" cy="310" r="80" fill="#4fc3f7" opacity="0.06"/>
  <!-- Cell cluster dots -->
  <g transform="translate(400,100)" opacity="0.7">
    <circle cx="-30" cy="-10" r="5" fill="#81c784"/><circle cx="-18" cy="-18" r="4" fill="#81c784"/>
    <circle cx="-8" cy="-5" r="6" fill="#81c784"/><circle cx="-22" cy="2" r="4.5" fill="#81c784"/>
    <circle cx="10" cy="-15" r="5" fill="#4fc3f7"/><circle cx="22" cy="-8" r="4" fill="#4fc3f7"/>
    <circle cx="15" cy="0" r="5.5" fill="#4fc3f7"/><circle cx="25" cy="5" r="3.5" fill="#4fc3f7"/>
    <circle cx="-5" cy="12" r="4" fill="#ffb74d"/><circle cx="5" cy="18" r="5" fill="#ffb74d"/>
    <circle cx="-12" cy="16" r="3.5" fill="#ffb74d"/><circle cx="15" cy="15" r="4.5" fill="#ffb74d"/>
    <circle cx="35" cy="-12" r="3" fill="#ef5350"/><circle cx="40" cy="-2" r="4" fill="#ef5350"/>
    <circle cx="-38" cy="8" r="3.5" fill="#ce93d8"/><circle cx="-35" cy="-5" r="4" fill="#ce93d8"/>
  </g>
  <!-- Text -->
  <text x="400" y="210" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="34" font-weight="bold" letter-spacing="-0.5">CELLxGENE Census</text>
  <text x="400" y="248" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-family="sans-serif" font-size="16" letter-spacing="2">50M+ Cells, One Query</text>
  <rect x="320" y="272" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Labels -->
  <g font-family="monospace" font-size="11" font-weight="500" opacity="0.35" fill="#fff" text-anchor="middle">
    <text x="200" y="330">Cell Type</text>
    <text x="330" y="330">Tissue</text>
    <text x="460" y="330">Disease</text>
    <text x="590" y="330">Expression</text>
  </g>
</svg>
