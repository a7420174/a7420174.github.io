<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="50%" style="stop-color:#1a6b5a"/>
      <stop offset="100%" style="stop-color:#134d41"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#2d9980"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="100" fill="#c9a84c" opacity="0.07"/>
  <circle cx="120" cy="300" r="70" fill="#2d9980" opacity="0.08"/>
  <!-- Paper/document icons -->
  <g transform="translate(340,100)" fill="none" stroke="#fff" stroke-width="2" opacity="0.85">
    <!-- Paper 1 (back) -->
    <rect x="-8" y="-8" width="50" height="65" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)"/>
    <!-- Paper 2 (middle) -->
    <rect x="8" y="-16" width="50" height="65" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)"/>
    <!-- Paper 3 (front) -->
    <rect x="24" y="-24" width="50" height="65" rx="4" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.6)"/>
    <!-- Lines on front paper -->
    <line x1="32" y1="-12" x2="64" y2="-12" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    <line x1="32" y1="-2" x2="58" y2="-2" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="32" y1="8" x2="66" y2="8" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <line x1="32" y1="18" x2="52" y2="18" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <!-- Clock icon -->
    <circle cx="82" cy="-30" r="14" stroke="#c9a84c" stroke-width="2" fill="rgba(201,168,76,0.1)"/>
    <line x1="82" y1="-30" x2="82" y2="-22" stroke="#c9a84c" stroke-width="2"/>
    <line x1="82" y1="-30" x2="88" y2="-28" stroke="#c9a84c" stroke-width="2"/>
  </g>
  <!-- Text -->
  <text x="400" y="220" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="34" font-weight="bold" letter-spacing="-0.5">Daily Paper Briefing</text>
  <text x="400" y="258" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="sans-serif" font-size="16" letter-spacing="2">Automated Research Monitoring</text>
  <!-- Bottom accent line -->
  <rect x="320" y="280" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Source labels -->
  <g font-family="monospace" font-size="13" font-weight="500" opacity="0.4" fill="#fff" text-anchor="middle">
    <text x="280" y="330">bioRxiv</text>
    <text x="400" y="330">PubMed</text>
    <text x="520" y="330">arXiv</text>
  </g>
  <!-- Connecting dots -->
  <circle cx="340" cy="326" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="460" cy="326" r="2" fill="rgba(255,255,255,0.3)"/>
</svg>
