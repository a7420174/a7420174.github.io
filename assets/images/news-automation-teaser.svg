<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="50%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c75c3a"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Decorative -->
  <circle cx="120" cy="100" r="90" fill="#c75c3a" opacity="0.06"/>
  <circle cx="700" cy="300" r="70" fill="#c9a84c" opacity="0.06"/>
  <!-- RSS icon -->
  <g transform="translate(370,95)" fill="none" stroke="#c75c3a" stroke-width="2.5" opacity="0.9">
    <rect x="-20" y="-20" width="40" height="40" rx="8" fill="rgba(199,92,58,0.12)"/>
    <circle cx="-8" cy="8" r="3" fill="#c75c3a"/>
    <path d="M-8 -2 A13 13 0 0 1 5 8" fill="none"/>
    <path d="M-8 -10 A21 21 0 0 1 13 8" fill="none"/>
  </g>
  <!-- Arrow to news lines -->
  <g transform="translate(420,110)" stroke="#c9a84c" stroke-width="1.5" opacity="0.5">
    <line x1="0" y1="0" x2="20" y2="0"/>
    <polyline points="16,-4 20,0 16,4" fill="none"/>
  </g>
  <!-- News lines -->
  <g transform="translate(450,98)">
    <rect x="0" y="0" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="0" y="12" width="60" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
    <rect x="0" y="24" width="70" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  </g>
  <!-- Text -->
  <text x="400" y="210" text-anchor="middle" fill="#fff" font-family="Georgia,serif" font-size="34" font-weight="bold" letter-spacing="-0.5">News Automation</text>
  <text x="400" y="248" text-anchor="middle" fill="rgba(255,255,255,0.55)" font-family="sans-serif" font-size="16" letter-spacing="2">RSS-Powered Drug Discovery Briefing</text>
  <!-- Bottom accent -->
  <rect x="320" y="272" width="160" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Source labels -->
  <g font-family="monospace" font-size="12" font-weight="500" opacity="0.35" fill="#fff" text-anchor="middle">
    <text x="220" y="330">STAT News</text>
    <text x="340" y="330">FierceBiotech</text>
    <text x="460" y="330">Endpoints</text>
    <text x="580" y="330">FDA</text>
  </g>
</svg>
