<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a4a"/>
      <stop offset="50%" style="stop-color:#1a6b5a"/>
      <stop offset="100%" style="stop-color:#134d41"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#2d9980"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/><line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/><line x1="640" y1="0" x2="640" y2="400"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="680" cy="100" r="100" fill="#c9a84c" opacity="0.07"/>
  <circle cx="120" cy="300" r="70" fill="#2d9980" opacity="0.08"/>
  <!-- Newspaper icon (centered, top area) -->
  <g transform="translate(400, 118)" opacity="0.9">
    <!-- Main newspaper body -->
    <rect x="-60" y="-50" width="120" height="90" rx="6"
          fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    <!-- Headline bar (gold) -->
    <rect x="-50" y="-40" width="100" height="14" rx="2" fill="rgba(201,168,76,0.55)"/>
    <!-- Text lines -->
    <rect x="-50" y="-18" width="65" height="7" rx="2" fill="rgba(255,255,255,0.25)"/>
    <rect x="-50" y="-5"  width="80" height="7" rx="2" fill="rgba(255,255,255,0.18)"/>
    <rect x="-50" y="8"   width="55" height="7" rx="2" fill="rgba(255,255,255,0.18)"/>
    <!-- Divider -->
    <line x1="-50" y1="22" x2="50" y2="22" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="-50" y="28"  width="70" height="6" rx="2" fill="rgba(255,255,255,0.13)"/>
    <!-- Folded corner -->
    <path d="M52,-50 L60,-42 L60,-50 Z" fill="rgba(201,168,76,0.3)"/>
    <!-- Weekly badge -->
    <rect x="28" y="-50" width="36" height="16" rx="3" fill="rgba(201,168,76,0.7)"/>
    <text x="46" y="-39" text-anchor="middle" font-family="sans-serif" font-size="8"
          font-weight="700" fill="#fff" letter-spacing="0.5">WEEKLY</text>
  </g>
  <!-- Title text (centered) -->
  <text x="400" y="228" text-anchor="middle" fill="#fff"
        font-family="Georgia,serif" font-size="34" font-weight="bold" letter-spacing="-0.5">Bioinformatics</text>
  <text x="400" y="262" text-anchor="middle"
        font-family="Georgia,serif" font-size="22" fill="url(#accent)" opacity="0.95">Weekly News</text>
  <!-- Bottom accent line -->
  <rect x="310" y="282" width="180" height="3" rx="1.5" fill="url(#accent)"/>
  <!-- Category labels -->
  <g font-family="monospace" font-size="12" font-weight="500" opacity="0.42" fill="#fff" text-anchor="middle">
    <text x="218" y="330">논문</text>
    <text x="318" y="330">툴 &amp; 소프트웨어</text>
    <text x="480" y="330">컨퍼런스</text>
    <text x="590" y="330">업계 뉴스</text>
  </g>
  <!-- Connecting dots -->
  <circle cx="268" cy="326" r="2" fill="rgba(255,255,255,0.28)"/>
  <circle cx="396" cy="326" r="2" fill="rgba(255,255,255,0.28)"/>
  <circle cx="528" cy="326" r="2" fill="rgba(255,255,255,0.28)"/>
</svg>
